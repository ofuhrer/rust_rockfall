case_id: validation_swissalti3d_pilot
title: swissALTI3D-style terrain ingestion pilot
level: 5
description: Small deterministic validation case that exercises LV95/LN02 terrain-source metadata, DEM consistency checks, and run_manifest_v1 provenance without using raw swisstopo data.
terrain:
  type: ascii_dem_clamped
  path: validation/data/processed/swisstopo_pilot/swissalti3d_pilot_crop.asc
  metadata_path: validation/data/processed/swisstopo_pilot/swissalti3d_pilot_metadata.yaml
block: { mass: 20.0, radius: 0.25 }
release:
  position: [2600001.0, 1200001.0, 1001.25]
  velocity: [0.8, -0.2, 0.0]
parameters:
  gravity: 9.81
  normal_restitution: 0.2
  tangential_restitution: 0.8
  friction_coefficient: 0.45
simulation: { dt: 0.01, t_max: 0.5, max_steps: 50, stop_velocity: 0.05 }
random: { seed: 2056, ensemble_size: 1 }
expected:
  metrics: [runout_m, max_speed_mps, max_bounce_height_m]
  maximums:
    runout_m: 2.0
    max_speed_mps: 5.0
    max_bounce_height_m: 1.0
outputs:
  diagnostics_json: validation/results/swissalti3d_pilot_metrics.json
  trajectory_csv: validation/results/swissalti3d_pilot_trajectory.csv
  manifest_json: validation/results/swissalti3d_pilot_manifest.json
references:
  dataset: swisstopo_swissalti3d
  notes:
    - "Synthetic swissALTI3D-style DEM crop used only for metadata/provenance ingestion tests."
    - "No raw swisstopo data are committed or required."
