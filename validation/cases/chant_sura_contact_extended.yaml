schema_version: benchmark_case_v1
case_id: validation_chant_sura_contact_extended
title: Chant Sura extended DEM-backed contact subset
level: 5
description: Extended Chant Sura validation experiment using multiple reconstructed trajectories whose early local-time-reset flight segments remain within the small RF16 DEM crop. Segment boundaries are treated as contact/rebound proxies for model-comparison diagnostics with the default translational_v0 model.
terrain:
  type: ascii_dem_clamped
  path: validation/data/processed/chant_sura_2020/terrain_rf16_contact_extended.asc
block: { mass: 210.0, radius: 0.265790716577 }
release:
  position: [2793260.85, 1180275.93, 2381.115790716577]
  velocity: [1.17599999905, -4.33600000013, -4.23375]
parameters:
  gravity: 9.81
  normal_restitution: 0.25
  tangential_restitution: 0.85
  friction_coefficient: 0.45
simulation: { dt: 0.005, t_max: 1.55, max_steps: 310, stop_velocity: 0.05 }
random: { seed: null, ensemble_size: 1 }
validation_scope:
  type: trajectory-contact-level
  note: "Extended model-comparison fixture only. Uses 16 reconstructed flight segments and 11 segment-boundary contact/rebound proxies from five public Chant Sura trajectories; not calibration or operational validation."
observations:
  release_points_csv: validation/data/processed/chant_sura_2020/release_points_contact_extended.csv
  trajectory_csv: validation/data/processed/chant_sura_2020/observed_trajectories_contact_extended.csv
  contact_events_csv: validation/data/processed/chant_sura_2020/observed_contact_events_extended.csv
expected:
  metrics:
    - validation_trajectory_count
    - observed_trajectory_sample_count
    - trajectory_shape_mean_error_m
    - trajectory_shape_p95_error_m
    - trajectory_shape_max_error_m
    - trajectory_final_position_mean_error_m
    - trajectory_energy_mean_relative_error
    - trajectory_max_jump_height_mean_error_m
    - trajectory_jump_height_envelope_error_m
    - observed_contact_event_count
    - contact_event_compared_count
    - impact_timing_mean_error_s
    - impact_timing_p95_error_s
    - rebound_velocity_mean_error_mps
    - rebound_velocity_p95_error_mps
    - post_impact_energy_change_mean_error_j
  values:
    validation_trajectory_count: 16.0
    observed_trajectory_sample_count: 816.0
    observed_contact_event_count: 11.0
    contact_event_compared_count: 11.0
  maximums:
    trajectory_shape_mean_error_m: 12.0
    trajectory_shape_p95_error_m: 30.0
    trajectory_shape_max_error_m: 40.0
    trajectory_final_position_mean_error_m: 30.0
    trajectory_energy_mean_relative_error: 12.0
    trajectory_max_jump_height_mean_error_m: 10.0
    trajectory_jump_height_envelope_error_m: 10.0
    impact_timing_mean_error_s: 1.2
    impact_timing_p95_error_s: 1.8
    rebound_velocity_mean_error_mps: 30.0
    rebound_velocity_p95_error_mps: 40.0
    post_impact_energy_change_mean_error_j: 250000.0
outputs:
  diagnostics_json: validation/results/chant_sura_contact_extended_metrics.json
  trajectory_csv: validation/results/chant_sura_contact_extended_trajectory.csv
references:
  dataset: chant_sura_2020
  literature:
    - "Caviezel, A. et al. (2020). Induced Rockfall Dataset #2 (Chant Sura Experimental Campaign), Flüelapass, Grisons, Switzerland. EnviDat. https://doi.org/10.16904/envidat.174."
    - "Caviezel, A. et al. (2021). The relevance of rock shape over mass. Nature Communications."
  notes:
    - "Uses selected early segments from RF16W200r1, RF16W200r3, RF18W200r1, RF18W800r6, and RF20e200r1, constrained to the checked-in RF16 DEM crop."
    - "Segment boundaries are contact/rebound proxies inferred from local time resets, not direct impact sensor labels."
    - "Observed raw z values are preserved in processed CSV metadata columns; z_m is shifted upward by equivalent sphere radius for the simulator centre-of-mass convention."
    - "This is a model-comparison validation fixture and is not calibrated field validation or operational hazard assessment."
report:
  verifies:
    - "Trajectory shape across multiple reconstructed Chant Sura flight segments on a real DEM patch."
    - "Approximate contact timing and rebound velocity across 11 segment-boundary contact proxies."
    - "Whether contact-model ranking persists beyond the original two-event RF16W200r1 fixture."
  does_not_verify:
    - "Full runout, deposition, instrumented impact timing, non-spherical EOTA shape effects, calibrated roughness/scarring, or operational hazard skill."
