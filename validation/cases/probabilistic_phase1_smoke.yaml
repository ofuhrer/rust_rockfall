case_id: probabilistic_phase1_smoke
title: Phase 1 probabilistic hazard-map semantics smoke
level: 4
description: Tiny deterministic smoke case for Level 1/2 probabilistic metadata propagation and labelled hazard-map products. This fixture is not a scientific benchmark or operational hazard product.
terrain:
  type: ascii_dem_clamped
  path: validation/data/processed/swisstopo_pilot/swissalti3d_pilot_crop.asc
  metadata_path: validation/data/processed/swisstopo_pilot/swissalti3d_pilot_metadata.yaml
block: { mass: 20.0, radius: 0.25 }
release:
  position: [2600001.0, 1200001.0, 1001.25]
  velocity: [0.8, -0.2, 0.0]
release_zone:
  metadata_path: validation/data/processed/swisstopo_pilot/release_zone_source_area.yaml
  generated_release_points_csv: validation/results/probabilistic_phase1_smoke_release_points.csv
probabilistic_metadata:
  source_zone_metadata_path: validation/data/processed/probabilistic_phase1/source_zone_smoke.yaml
  scenario_table_path: validation/data/processed/probabilistic_phase1/scenario_table_smoke.csv
  map_product_id: phase1_smoke_map
  probability_mode: sampling_weighted_conditional
  normalization_scope: conditioned_on_scenario
  scenario_id: phase1_smoke_scenario
parameters:
  gravity: 9.81
  normal_restitution: 0.2
  tangential_restitution: 0.8
  friction_coefficient: 0.45
simulation: { dt: 0.01, t_max: 0.5, max_steps: 50, stop_velocity: 0.05 }
random: { seed: 2056003, ensemble_size: 1 }
expected:
  metrics:
    - release_zone_point_count
    - release_zone_extent_area_m2
    - release_zone_mean_runout_m
    - release_zone_max_runout_m
  values:
    release_zone_point_count: 4.0
    release_zone_extent_area_m2: 16.0
  maximums:
    release_zone_mean_runout_m: 2.0
    release_zone_max_runout_m: 2.0
outputs:
  diagnostics_json: validation/results/probabilistic_phase1_smoke_metrics.json
  manifest_json: validation/results/probabilistic_phase1_smoke_manifest.json
  trajectory_csv: validation/results/probabilistic_phase1_smoke_trajectory.csv
  trajectory_metadata_csv: validation/results/probabilistic_phase1_smoke_trajectory_metadata.csv
  ensemble_trajectories_dir: validation/results/probabilistic_phase1_smoke_trajectories
  ensemble_deposition_csv: validation/results/probabilistic_phase1_smoke_deposition.csv
hazard_layers:
  statistics:
    kinetic_energy_exceedance_j: [5.0]
    jump_height_exceedance_m: [0.05]
    velocity_exceedance_mps: [1.0]
hazard_probability:
  probability_model: sampling_weighted
  metadata_path: validation/results/probabilistic_phase1_smoke_trajectory_metadata.csv
  weight_column: sampling_weight
  normalization_convention: conditioned_on_filter
  filters:
    source_zone_ids: [swissalti3d_pilot_source_area]
    scenario_ids: [phase1_smoke_scenario]
    block_mass_kg_min: null
    block_mass_kg_max: null
hazard_map_package:
  map_product_id: phase1_smoke_map
  probability_mode: sampling_weighted_conditional
  normalization_scope: conditioned_on_filter
  source_zone_metadata_path: validation/data/processed/probabilistic_phase1/source_zone_smoke.yaml
  scenario_table_path: validation/data/processed/probabilistic_phase1/scenario_table_smoke.csv
  map_package_manifest_json: hazard/results/probabilistic_phase1_smoke/probabilistic_phase1_smoke_map_package_manifest.json
  limitations:
    - Research smoke fixture; not an operational hazard product.
    - No physical or annual probability model is included.
references:
  dataset: synthetic_swiss_fixture
  notes:
    - "End-to-end Phase 1 semantics smoke: source-zone sidecar, scenario table, trajectory metadata, weighted hazard layers, and map-package manifest."
    - "All sampling weights are 1.0 so weighted layers are expected to match unweighted trajectory-count layers."
