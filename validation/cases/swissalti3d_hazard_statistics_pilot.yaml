case_id: validation_swissalti3d_hazard_statistics_pilot
title: swissALTI3D-style hazard-statistics pilot
level: 5
description: Small deterministic Swiss pilot case that writes full source-area trajectories for additive exceedance hazard-layer post-processing. It uses the synthetic LV95/LN02 terrain, release-zone, and terrain-class fixtures; it does not change simulation physics or defaults.
terrain:
  type: ascii_dem_clamped
  path: validation/data/processed/swisstopo_pilot/swissalti3d_pilot_crop.asc
  metadata_path: validation/data/processed/swisstopo_pilot/swissalti3d_pilot_metadata.yaml
terrain_classes:
  metadata_path: validation/data/processed/swisstopo_pilot/terrain_classes_metadata.yaml
block: { mass: 20.0, radius: 0.25 }
release:
  position: [2600001.0, 1200001.0, 1001.25]
  velocity: [0.8, -0.2, 0.0]
release_zone:
  metadata_path: validation/data/processed/swisstopo_pilot/release_zone_source_area.yaml
  generated_release_points_csv: validation/results/swissalti3d_hazard_stats_release_points.csv
parameters:
  gravity: 9.81
  normal_restitution: 0.2
  tangential_restitution: 0.8
  friction_coefficient: 0.45
simulation: { dt: 0.01, t_max: 0.5, max_steps: 50, stop_velocity: 0.05 }
random: { seed: 2056, ensemble_size: 1 }
hazard_layers:
  statistics:
    kinetic_energy_exceedance_j: [5.0, 10.0]
    jump_height_exceedance_m: [0.05, 0.10]
    velocity_exceedance_mps: [0.5, 1.0]
expected:
  metrics:
    - release_zone_point_count
    - release_zone_extent_area_m2
    - release_zone_mean_runout_m
    - release_zone_max_runout_m
  values:
    release_zone_point_count: 4.0
    release_zone_extent_area_m2: 16.0
  maximums:
    release_zone_mean_runout_m: 2.0
    release_zone_max_runout_m: 2.0
outputs:
  diagnostics_json: validation/results/swissalti3d_hazard_statistics_pilot_metrics.json
  manifest_json: validation/results/swissalti3d_hazard_statistics_pilot_manifest.json
  ensemble_deposition_csv: validation/results/swissalti3d_hazard_stats_deposition.csv
  ensemble_trajectories_dir: validation/results/swissalti3d_hazard_stats_trajectories
  ensemble_impact_events_dir: validation/results/swissalti3d_hazard_stats_impacts
references:
  dataset: swisstopo_swissalti3d
  notes:
    - "Synthetic Swiss pilot fixture for additive hazard-statistics post-processing."
    - "Exceedance thresholds are illustrative and not operational Swiss hazard criteria."
