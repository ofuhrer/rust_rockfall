schema_version: benchmark_case_v1
case_id: validation_performance_smoke
title: CI-safe performance instrumentation smoke case
level: 4
description: Small deterministic source-area case used to verify that run_manifest_v1 performance timing metadata is written without changing simulation physics or validation semantics.
terrain:
  type: ascii_dem_clamped
  path: validation/data/processed/swisstopo_pilot/swissalti3d_pilot_crop.asc
  metadata_path: validation/data/processed/swisstopo_pilot/swissalti3d_pilot_metadata.yaml
block: { mass: 20.0, radius: 0.25 }
release:
  position: [2600001.0, 1200001.0, 1001.25]
  velocity: [0.8, -0.2, 0.0]
release_zone:
  metadata_path: validation/data/processed/swisstopo_pilot/release_zone_source_area.yaml
  generated_release_points_csv: validation/results/performance_smoke_release_points.csv
parameters:
  gravity: 9.81
  normal_restitution: 0.2
  tangential_restitution: 0.8
  friction_coefficient: 0.45
simulation: { dt: 0.01, t_max: 0.5, max_steps: 50, stop_velocity: 0.05 }
random: { seed: 2056002, ensemble_size: 1 }
expected:
  metrics:
    - release_zone_point_count
    - release_zone_extent_area_m2
    - release_zone_mean_runout_m
    - release_zone_max_runout_m
  values:
    release_zone_point_count: 4.0
    release_zone_extent_area_m2: 16.0
  maximums:
    release_zone_mean_runout_m: 2.0
    release_zone_max_runout_m: 2.0
outputs:
  diagnostics_json: validation/results/performance_smoke_metrics.json
  manifest_json: validation/results/performance_smoke_manifest.json
  ensemble_deposition_csv: validation/results/performance_smoke_deposition.csv
references:
  dataset: synthetic_swiss_fixture
  notes:
    - "CI-safe timing smoke case; reported wall-clock values are diagnostic and not pass/fail performance budgets."
