case_id: validation_tschamut_basic
title: Tschamut public rockfall dataset limited validation
level: 5
description: Limited distribution-level comparison against a small processed subset of the public SLF/WSL EnviDat Tschamut 2014 LPS trajectory dataset.
terrain:
  type: ascii_dem_clamped
  path: validation/data/processed/tschamut/terrain.asc
  parameters: {}
block: { mass: 69.0, radius: 0.176667 }
release:
  position: [33.4, 236.67, 76.276667]
  velocity: [0.74314, 1.3547, 0.76954]
parameters:
  gravity: 9.81
  normal_restitution: 0.25
  tangential_restitution: 0.85
  friction_coefficient: 0.45
  roughness_model: stochastic_contact_v1
  roughness_std_normal: 0.08
  roughness_std_tangent: 0.06
  roughness_std_angle: 0.08
simulation: { dt: 0.02, t_max: 18.0, max_steps: 900, stop_velocity: 0.1 }
random: { seed: 34014, ensemble_size: 6 }
validation_scope:
  type: distribution-level
  note: "The current v0.5.0 model is not calibrated for this dataset, runs this case with soil_interaction_model none, and is not expected to reproduce individual trajectories."
observations:
  release_points_csv: validation/data/processed/tschamut/release_points.csv
  deposition_points_csv: validation/data/processed/tschamut/observed_deposition.csv
expected:
  metrics:
    - validation_release_count
    - validation_simulated_trajectory_count
    - observed_mean_runout_m
    - simulated_mean_runout_m
    - runout_distance_error_m
    - deposition_centroid_error_m
    - deposition_cloud_mean_nearest_error_m
    - lateral_spread_error_m
    - deposition_cloud_overlap_fraction
  tolerances: {}
outputs:
  diagnostics_json: validation/results/tschamut_basic_metrics.json
  trajectory_csv: validation/results/tschamut_basic_trajectory.csv
  ensemble_deposition_csv: validation/results/tschamut_basic_ensemble_deposition.csv
references:
  dataset: tschamut2014
  literature:
    - "Volkwein, A., Gerber, W. (2018). Repetitive trajectory testing in Tschamut 2014. EnviDat. https://doi.org/10.16904/envidat.34."
  notes:
    - "Uses a small checked-in derived subset from the public LPS trajectory table so normal CI does not download large raw data."
    - "The terrain is an opt-in clamped ESRI ASCII grid built as an IDW residual terrain proxy from public LPS ground points; it is not an official field DEM."
    - "Block geometry is approximated as a sphere; roughness is synthetic and not calibrated to Tschamut; scarring_contact_v1 is not enabled in this validation case."
report:
  verifies:
    - "Loads public-derived Tschamut release and deposition points and runs deterministic seeded ensembles from them."
    - "Reports distribution-level runout and deposition-cloud discrepancies for the current uncalibrated v0.5.0 model using the IDW residual terrain proxy with soil_interaction_model none."
  does_not_verify:
    - "Individual Tschamut trajectories, operational hazard skill, calibrated terrain roughness, block shape effects, vegetation, or fragmentation."
