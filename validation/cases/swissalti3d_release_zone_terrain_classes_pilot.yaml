case_id: validation_swissalti3d_release_zone_terrain_classes_pilot
title: swissALTI3D-style source-area pilot with terrain classes
level: 5
description: Small deterministic validation case that combines LV95/LN02 terrain metadata, a synthetic source-area polygon, and an opt-in terrain/material-class raster with class-dependent contact parameters. It tests provenance and spatial parameter lookup only; it does not change simulation physics or defaults.
terrain:
  type: ascii_dem_clamped
  path: validation/data/processed/swisstopo_pilot/swissalti3d_pilot_crop.asc
  metadata_path: validation/data/processed/swisstopo_pilot/swissalti3d_pilot_metadata.yaml
terrain_classes:
  metadata_path: validation/data/processed/swisstopo_pilot/terrain_classes_metadata.yaml
block: { mass: 20.0, radius: 0.25 }
release:
  position: [2600001.0, 1200001.0, 1001.25]
  velocity: [0.8, -0.2, 0.0]
release_zone:
  metadata_path: validation/data/processed/swisstopo_pilot/release_zone_source_area.yaml
  generated_release_points_csv: validation/results/swissalti3d_terrain_class_release_points.csv
parameters:
  gravity: 9.81
  normal_restitution: 0.2
  tangential_restitution: 0.8
  friction_coefficient: 0.45
simulation: { dt: 0.01, t_max: 0.5, max_steps: 50, stop_velocity: 0.05 }
random: { seed: 2056, ensemble_size: 1 }
expected:
  metrics:
    - release_zone_point_count
    - release_zone_extent_area_m2
    - release_zone_mean_runout_m
    - release_zone_max_runout_m
  values:
    release_zone_point_count: 4.0
    release_zone_extent_area_m2: 16.0
  maximums:
    release_zone_mean_runout_m: 2.0
    release_zone_max_runout_m: 2.0
outputs:
  diagnostics_json: validation/results/swissalti3d_release_zone_terrain_classes_pilot_metrics.json
  manifest_json: validation/results/swissalti3d_release_zone_terrain_classes_pilot_manifest.json
  ensemble_deposition_csv: validation/results/swissalti3d_terrain_class_deposition.csv
references:
  dataset: swisstopo_swissalti3d
  notes:
    - "Synthetic terrain/material-class fixture; not a real Swiss terrain-class map."
    - "Class-dependent parameters are illustrative and not calibrated."
