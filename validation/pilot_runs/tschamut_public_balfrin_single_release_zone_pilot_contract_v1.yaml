schema_version: balfrin_single_release_zone_pilot_contract_v1
pilot_id: tschamut_public_pilot
run_id: tschamut_public_balfrin_single_release_zone_pilot_contract_v1
contract_status: ready_for_balfrin_single_release_zone_pilot
operational_status: research_diagnostic

release_zone_scope:
  release_zone_count: 1
  release_cell_count: 10
  trajectory_count_target: 1000
  trajectories_per_release_cell: 100
  block_scenario_count: 3
  block_scenario_policy: pragmatic_conditional_block_scenarios

validation_output:
  validation_output_mode: rebuildable_reduced_output
  hazard_output_profile: scalable_conditional
  conditional_curve_export: summary-only
  grid_csv_export: none
  export_geotiff: true
  pilot_gis_package: true

expected_artifact_families:
  - diagnostics_json
  - manifest_json
  - trajectory_csv
  - ensemble_deposition_csv
  - trajectory_metadata_csv
  - impact_events_csv
  - pilot_gis_package_manifest_json
  - map_package_manifest_json

hazard_layer_products:
  - conditional_intensity_exceedance
  - reach_probability
  - max_kinetic_energy
  - max_jump_height

balfrin_resource_assumptions:
  execution_boundary: single_job_balfrin_slurm
  trajectory_workers: 2
  reducer_workers: 2
  explicit_grid_required: true
  distributed_execution_authorized: false
  generated_outputs_committed: false
  single_job_boundary: true

no_go_boundaries:
  - annual_frequency
  - physical_probability
  - return_period
  - risk_map
  - exposure
  - vulnerability
  - operational_hazard_map
  - distributed_execution
  - Swiss_wide_rollout
  - physical_probability_authorization

required_inputs:
  - docs/balfrin_single_job_execution_sufficiency.md
  - docs/tschamut_public_conditional_pilot_gate_report.md
  - scripts/check_balfrin_tschamut_readiness.py
  - scripts/summarize_bounded_next_ensemble_feasibility_probe.py
  - validation/pilot_runs/tschamut_public_scalable_conditional_target_gate_v1.yaml
  - validation/pilot_runs/tschamut_public_balfrin_target_gate_reproduction_v1.yaml

contract_boundary_summary:
  - one release zone is frozen for the next Balfrin pilot
  - native reduced output is required and remains non-operational
  - conditional GIS outputs remain diagnostic products only
  - scale-up, physical-frequency, and operational claims remain out of scope
