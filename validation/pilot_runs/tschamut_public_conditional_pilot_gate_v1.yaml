# Share-safe selected-domain run-freeze for the first Tschamut public
# conditional pilot gate. This records a no-go gate because the ignored
# processed public DEM is absent in clean checkouts; it is not a completed
# simulation run and does not carry operational, annual, physical-probability,
# or risk semantics.
schema_version: public_real_site_conditional_pilot_run_v1
pilot_id: tschamut_public_pilot
run_id: tschamut_public_conditional_gate_v1
run_status: no_go
operational_status: research_diagnostic
validation_maturity_target: V1_preparation_fixture

input_freeze:
  geodata_manifest_path: data/processed/swisstopo/tschamut_public_pilot_manifest.yaml
  source_scenario_policy_path: validation/policies/tschamut_public_source_scenario_policy_v1.yaml
  benchmark_case_path: null
  terrain_metadata_path: null
  source_zone_metadata_path: null
  scenario_table_path: null
  map_product_id: tschamut_public_conditional_gate_v1
  freeze_status: blocked_missing_processed_dem
  freeze_notes:
    - selected Tschamut geodata manifest and source/scenario policy are frozen
    - benchmark case and terrain/source/scenario sidecars are blocked until the ignored processed DEM exists locally
    - this no-go gate must be resolved before any trajectory or hazard-layer output is interpreted

physics_freeze:
  defaults_changed: false
  simulator_behavior_changed: false
  contact_model: translational_v0
  soil_interaction_model: none
  roughness_model: none
  parameters_status: frozen
  tuning_after_output_review_allowed: false

sampling_plan:
  random_seed: 34014
  gate_run_trajectories_per_release_zone: 1
  target_trajectories_per_release_zone: 100
  release_cell_policy: deterministic_grid
  scenario_weight_semantics: conditional_sampling_only
  worker_count: 2
  reducer_mode: deterministic_local_reducer

hazard_output_plan:
  probability_mode: sampling_weighted_conditional
  normalization_scope: conditioned_on_filter
  kinetic_energy_exceedance_j: [1000.0, 10000.0]
  jump_height_exceedance_m: [1.0, 2.0]
  velocity_exceedance_mps: []
  conditional_curve_table_required: true
  geotiff_required: true
  pilot_gis_package_required: true
  explicit_grid_required: true
  explicit_grid:
    xmin: 2696376.0
    ymin: 1167384.0
    ncols: 300
    nrows: 304
    cell_size_m: 2.0
  output_roots:
    validation_results: validation/private/tschamut_public_pilot/gate_v1
    hazard_results: hazard/results/tschamut_public_pilot/gate_v1
  generated_outputs_committed: false

workflow_gates:
  geodata_manifest_validated: pass
  source_scenario_policy_validated: pass
  benchmark_case_frozen: no-go
  small_gate_run_completed: no-go
  conditional_curves_generated: no-go
  gis_package_generated: no-go
  convergence_diagnostics_recorded: no-go
  output_budget_recorded: no-go
  visual_qa_recorded: no-go
  report_classification: no-go

output_budget:
  max_committed_generated_files: 0
  max_private_file_count: 200
  max_private_total_bytes: 50000000
  required_recorded_metrics:
    - runtime_seconds
    - memory_peak_mb
    - output_file_count
    - output_total_bytes
    - trajectory_count
    - release_cell_count

run_evidence:
  evidence_status: no-go
  validation_manifest_path: null
  hazard_manifest_path: null
  conditional_curve_table_path: null
  map_package_manifest_path: null
  pilot_gis_package_manifest_path: null
  reducer_chunk_manifest_dir: null
  runtime_seconds: null
  memory_peak_mb: null
  output_file_count: null
  output_total_bytes: null
  trajectory_count: null
  release_cell_count: null
  convergence_diagnostics:
    status: no-go
    notes:
      - no trajectories or hazard layers were run because the selected public pilot DEM is absent from the ignored local processed path
      - the no-go classification records a reproducibility/input-data blocker, not model behavior
  artifact_checksums:
    validation_manifest_sha256: null
    hazard_manifest_sha256: null
    conditional_curve_table_sha256: null
    map_package_manifest_sha256: null
    pilot_gis_package_manifest_sha256: null

no_go_blocker:
  blocker_id: missing_processed_tschamut_public_dem
  status: active
  classification: no-go
  evidence_output_dir: validation/private/tschamut_public_pilot/dem_sensitivity_gate_v1
  missing_paths:
    - data/processed/swisstopo/tschamut_public_pilot/input/tschamut_public_swissalti3d_crop.asc
    - data/processed/swisstopo/tschamut_public_pilot/input/tschamut_public_swissalti3d_metadata.yaml
  recovery_commands:
    - UV_CACHE_DIR=/tmp/uv-cache uv run python scripts/prepare_tschamut_public_benchmark.py --output-root data/processed/swisstopo/tschamut_public_pilot --padding-m 250 --force
    - UV_CACHE_DIR=/tmp/uv-cache uv run python scripts/run_dem_terrain_sensitivity.py --pilot-manifest data/processed/swisstopo/tschamut_public_pilot_manifest.yaml --source-scenario-policy validation/policies/tschamut_public_source_scenario_policy_v1.yaml --output-dir validation/private/tschamut_public_pilot/dem_sensitivity_gate_v1
    - UV_CACHE_DIR=/tmp/uv-cache uv run python scripts/validate_public_real_site_conditional_pilot_run.py validation/pilot_runs/tschamut_public_conditional_pilot_gate_v1.yaml --print-command-plan
  notes:
    - this no-go gate is not a model result
    - no conditional curves, GIS artifacts, checksums, runtime, memory, or output budget evidence exists yet
    - generated outputs must stay under ignored validation/private and hazard/results paths

report_plan:
  report_path: docs/tschamut_public_conditional_pilot_gate_report.md
  allowed_classifications:
    - pass
    - no-go
    - inconclusive
  current_classification: no-go

claim_boundary:
  current_allowed_products:
    - unweighted_diagnostic
    - sampling_weighted_conditional
    - conditional_intensity_exceedance
  future_products:
    - physical_probability
    - annual_intensity_frequency
  unsupported_current_claims:
    - annual_frequency
    - return_period
    - physical_probability
    - risk_map
    - operational_hazard_map
    - validated_hazard_map
  notes:
    - public geodata and source-zone policies are input provenance, not validation evidence by themselves
    - current pilot outputs must be classified as research diagnostics or sampling-weighted conditional products
    - this no-go run-freeze authorizes only conditional diagnostic execution after the missing local DEM blocker is resolved
