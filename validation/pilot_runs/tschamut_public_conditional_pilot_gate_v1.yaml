# Share-safe selected-domain run-freeze for the first Tschamut public
# conditional pilot gate. This records local ignored execution evidence after
# the processed public DEM was regenerated or verified locally. Generated DEM,
# validation, hazard, GIS, and scaling artifacts remain ignored and are not
# committed. The gate remains a research diagnostic conditional product, not an
# operational, annual, physical-probability, return-period, or risk product.
schema_version: public_real_site_conditional_pilot_run_v1
pilot_id: tschamut_public_pilot
run_id: tschamut_public_conditional_gate_v1
run_status: gate_run_completed
operational_status: research_diagnostic
validation_maturity_target: V1_preparation_fixture

input_freeze:
  geodata_manifest_path: data/processed/swisstopo/tschamut_public_pilot_manifest.yaml
  source_scenario_policy_path: validation/policies/tschamut_public_source_scenario_policy_v1.yaml
  benchmark_case_path: validation/private/tschamut_public_pilot/gate_v1/tschamut_public_conditional_gate_case.yaml
  benchmark_case_id: validation_tschamut_public_conditional_gate_v1
  terrain_metadata_path: data/processed/swisstopo/tschamut_public_pilot/input/tschamut_public_swissalti3d_metadata.yaml
  source_zone_metadata_path: data/processed/swisstopo/tschamut_public_pilot/input/tschamut_public_source_zone_metadata_v1.yaml
  scenario_table_path: data/processed/swisstopo/tschamut_public_pilot/input/tschamut_public_scenario_table_v1.csv
  map_product_id: tschamut_public_conditional_gate_v1
  freeze_status: frozen
  freeze_notes:
    - local ignored processed Tschamut public DEM and metadata are present
    - local DEM sensitivity, validation, hazard, GIS package, and scaling artifacts were regenerated or verified for this gate
    - this freeze authorizes only a small sampling-weighted conditional research diagnostic gate

physics_freeze:
  defaults_changed: false
  simulator_behavior_changed: false
  contact_model: translational_v0
  soil_interaction_model: none
  roughness_model: stochastic_contact_v1
  parameters_status: frozen
  tuning_after_output_review_allowed: false

sampling_plan:
  random_seed: 34014
  gate_run_trajectories_per_release_zone: 6
  target_trajectories_per_release_zone: 100
  release_cell_policy: deterministic_grid
  scenario_weight_semantics: conditional_sampling_only
  worker_count: 2
  reducer_mode: deterministic_local_reducer

hazard_output_plan:
  probability_mode: sampling_weighted_conditional
  normalization_scope: conditioned_on_filter
  kinetic_energy_exceedance_j: [1000.0, 10000.0]
  jump_height_exceedance_m: [1.0, 2.0]
  velocity_exceedance_mps: []
  conditional_curve_table_required: true
  geotiff_required: true
  pilot_gis_package_required: true
  explicit_grid_required: true
  explicit_grid:
    xmin: 2696376.0
    ymin: 1167384.0
    ncols: 300
    nrows: 304
    cell_size_m: 2.0
  output_roots:
    validation_results: validation/private/tschamut_public_pilot/gate_v1
    hazard_results: hazard/results/tschamut_public_pilot/gate_v1
  generated_outputs_committed: false

workflow_gates:
  geodata_manifest_validated: pass
  source_scenario_policy_validated: pass
  benchmark_case_frozen: pass
  small_gate_run_completed: pass
  conditional_curves_generated: pass
  gis_package_generated: pass
  convergence_diagnostics_recorded: inconclusive
  output_budget_recorded: pass
  visual_qa_recorded: inconclusive
  report_classification: inconclusive

output_budget:
  max_committed_generated_files: 0
  max_private_file_count: 200
  max_private_total_bytes: 250000000
  required_recorded_metrics:
    - runtime_seconds
    - memory_peak_mb
    - output_file_count
    - output_total_bytes
    - trajectory_count
    - release_cell_count

