block_scenario_policy:
  block_population_status: representative_scenarios_not_physical_population
  active_shape_physics_supported: false
  sampling_weight_semantics: conditional_sampling_only
  scenarios:
    - block_scenario_id: tschamut_public_block_small
      block_size_class: tschamut_selected_rows_small
      block_shape_class: sphere
      block_radius_m: 0.16
      block_mass_kg: 40.0
      sampling_weight: 3.0
      derivation_basis: selected public Tschamut rows with block_id 4 in the default ten-run package
    - block_scenario_id: tschamut_public_block_medium
      block_size_class: tschamut_selected_rows_medium
      block_shape_class: sphere
      block_radius_m: 0.176667
      block_mass_kg: 69.0
      sampling_weight: 5.0
      derivation_basis: selected public Tschamut rows with block_id 1 in the default ten-run package
    - block_scenario_id: tschamut_public_block_large
      block_size_class: tschamut_selected_rows_large
      block_shape_class: sphere
      block_radius_m: 0.198333
      block_mass_kg: 79.0
      sampling_weight: 2.0
      derivation_basis: selected public Tschamut rows with block_id 2 in the default ten-run package

claim_boundary:
  current_allowed_products:
    - unweighted_diagnostic
    - sampling_weighted_conditional
    - conditional_intensity_exceedance
  unsupported_current_claims:
    - annual_frequency
    - return_period
    - physical_probability
    - risk_map
    - operational_hazard_map
    - validated_hazard_map
  notes:
    - source-zone choices are input assumptions, not validation evidence by themselves
    - release-cell and block-scenario sampling weights are conditional sampling weights, not physical probabilities
    - this policy supports a research diagnostic conditional pilot only, not an operational source-zone approval
