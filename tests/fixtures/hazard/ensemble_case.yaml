case_id: hazard_fixture_ensemble
title: Hazard layer fixture with ensemble trajectories
level: 4
description: Fixture where the representative trajectory differs from opt-in ensemble trajectory directory.
terrain:
  type: plane
  parameters: { z0_m: 0.0, slope_x: 0.0, slope_y: 0.0 }
block: { mass: 10.0, radius: 0.5 }
release:
  position: [0.0, 0.0, 1.0]
  velocity: [1.0, 0.0, 0.0]
parameters:
  gravity: 9.81
  normal_restitution: 0.5
  tangential_restitution: 0.8
  friction_coefficient: 0.3
simulation: { dt: 0.1, t_max: 1.0, stop_velocity: 0.1 }
random: { seed: 7, ensemble_size: 2 }
outputs:
  trajectory_csv: tests/fixtures/hazard/trajectory_a.csv
  ensemble_trajectories_dir: tests/fixtures/hazard/ensemble_trajectories
  ensemble_impact_events_dir: tests/fixtures/hazard/ensemble_impacts
  ensemble_deposition_csv: tests/fixtures/hazard/deposition.csv
