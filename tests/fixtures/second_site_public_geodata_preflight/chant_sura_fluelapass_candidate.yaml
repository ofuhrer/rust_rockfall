schema_version: second_site_public_geodata_preflight_v1
candidate_site_id: chant_sura_fluelapass_portability_example_v1
candidate_site_name: Chant Sura / Flüelapass portability example
candidate_selection_rationale: >-
  Chant Sura is the clearest concrete Swiss candidate already represented in
  repository benchmark metadata and validation fixtures. The site is real, but
  the public-geodata manifest remains metadata-only until terrain, source-zone,
  scenario, and context inputs are staged under the candidate roots.
site_extent:
  crs: EPSG:2056
  xmin: 2793000.0
  ymin: 1180200.0
  xmax: 2793800.0
  ymax: 1180800.0
source_zone_scenario_contract:
  source_zone_id_pattern: chant_sura_*
  source_zone_geometry: LV95 polygon
  release_point_table: one row per release point
  observed_deposition_or_field_observation: optional if a site-specific QA source exists
  block_scenario_table: CSV table with one row per block / scenario record
  scenario_probability_semantics: normalized within a block family; no annual frequency claim
expected_processed_input_root: data/processed/swisstopo/chant_sura_fluelapass_portability_example_v1/input
expected_processed_context_root: data/processed/swisstopo/chant_sura_fluelapass_portability_example_v1/context
expected_terrain_crop_path: data/processed/swisstopo/chant_sura_fluelapass_portability_example_v1/input/terrain.asc
expected_terrain_metadata_path: data/processed/swisstopo/chant_sura_fluelapass_portability_example_v1/input/terrain_metadata.yaml
expected_source_zone_metadata_path: data/processed/swisstopo/chant_sura_fluelapass_portability_example_v1/input/source_zone_metadata.yaml
expected_scenario_table_path: data/processed/swisstopo/chant_sura_fluelapass_portability_example_v1/input/scenario_table.csv
expected_source_scenario_policy_path: validation/policies/chant_sura_fluelapass_portability_example_v1_source_scenario_policy_v1.yaml
