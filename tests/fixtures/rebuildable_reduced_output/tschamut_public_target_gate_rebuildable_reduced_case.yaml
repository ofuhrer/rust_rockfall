    block_mass_kg_min: null
    block_mass_kg_max: null
hazard_map_package:
  map_product_id: tschamut_public_scalable_conditional_target_gate_v1_rebuildable_reduced
  probability_mode: sampling_weighted_conditional
  normalization_scope: conditioned_on_filter
  source_zone_metadata_path: data/processed/swisstopo/tschamut_public_pilot/input/tschamut_public_source_zone_metadata_v1.yaml
  scenario_table_path: data/processed/swisstopo/tschamut_public_pilot/input/tschamut_public_scenario_table_v1.csv
  map_package_manifest_json: validation/private/tschamut_public_pilot/target_gate_v1_rebuildable_reduced/tschamut_public_scalable_conditional_target_gate_v1_rebuildable_reduced_map_package_manifest.json
