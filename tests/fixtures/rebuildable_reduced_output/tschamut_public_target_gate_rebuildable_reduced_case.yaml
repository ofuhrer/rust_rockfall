case_id: validation_tschamut_public_target_gate_v1_rebuildable_reduced
title: Tschamut public target gate v1 rebuildable-reduced validation output
level: 5
description: Same-scale selected Tschamut target gate staged locally from public inputs with the native rebuildable_reduced_output mode. No parameters are tuned.
terrain:
  type: ascii_dem_clamped
  path: data/processed/swisstopo/tschamut_public_pilot/input/tschamut_public_swissalti3d_crop.asc
  metadata_path: data/processed/swisstopo/tschamut_public_pilot/input/tschamut_public_swissalti3d_metadata.yaml
block:
  mass: 69.0
  radius: 0.176667
release:
  position:
  - 2696632.153
  - 1167735.902
  - 1676.276667
  velocity:
  - 0.74314
  - 1.3547
  - 0.76954
parameters:
  gravity: 9.81
  normal_restitution: 0.25
  tangential_restitution: 0.85
  friction_coefficient: 0.45
  contact_model: translational_v0
  roughness_model: stochastic_contact_v1
  roughness_std_normal: 0.08
  roughness_std_tangent: 0.06
  roughness_std_angle: 0.08
simulation:
  dt: 0.02
  t_max: 18.0
  max_steps: 900
  stop_velocity: 0.1
random:
  seed: 34014
  ensemble_size: 100
hazard_layers:
  statistics:
    kinetic_energy_exceedance_j:
    - 1000.0
    - 10000.0
    jump_height_exceedance_m:
    - 0.5
    - 1.0
    - 2.0
    velocity_exceedance_mps:
    - 5.0
    - 10.0
validation_scope:
  type: public-benchmark-reproduction
  note: Scientific diagnostic only; no tuning, operational validity, or proprietary-model equivalence claim.
observations:
  release_points_csv: data/processed/swisstopo/tschamut_public_pilot/input/release_points_lv95.csv
  deposition_points_csv: data/processed/swisstopo/tschamut_public_pilot/input/observed_deposition_lv95.csv
expected:
  metrics:
  - validation_release_count
  - validation_simulated_trajectory_count
  - observed_mean_runout_m
  - simulated_mean_runout_m
  - runout_distance_error_m
  - deposition_centroid_error_m
  - deposition_cloud_mean_nearest_error_m
  - lateral_spread_error_m
  - deposition_cloud_overlap_fraction
  tolerances: {}
outputs:
  diagnostics_json: validation/private/tschamut_public_pilot/target_gate_v1_rebuildable_reduced/validation_tschamut_public_target_gate_v1_rebuildable_reduced_metrics.json
  manifest_json: validation/private/tschamut_public_pilot/target_gate_v1_rebuildable_reduced/validation_tschamut_public_target_gate_v1_rebuildable_reduced_manifest.json
  trajectory_csv: validation/private/tschamut_public_pilot/target_gate_v1_rebuildable_reduced/validation_tschamut_public_target_gate_v1_rebuildable_reduced_trajectory.csv
  ensemble_deposition_csv: validation/private/tschamut_public_pilot/target_gate_v1_rebuildable_reduced/validation_tschamut_public_target_gate_v1_rebuildable_reduced_deposition.csv
  trajectory_metadata_csv: validation/private/tschamut_public_pilot/target_gate_v1_rebuildable_reduced/validation_tschamut_public_target_gate_v1_rebuildable_reduced_trajectory_metadata.csv
  impact_events_csv: validation/private/tschamut_public_pilot/target_gate_v1_rebuildable_reduced/validation_tschamut_public_target_gate_v1_rebuildable_reduced_impact_events.csv
  validation_output_mode: rebuildable_reduced_output
references:
  dataset: tschamut2014
  literature:
  - Volkwein, A., Gerber, W. (2018). Repetitive trajectory testing in Tschamut 2014. EnviDat. https://doi.org/10.16904/envidat.34.
  - Volkwein et al. (2018). Repetitive Rockfall Trajectory Testing. Geosciences 8(3), 88. https://doi.org/10.3390/geosciences8030088.
  - swisstopo swissALTI3D public terrain data, LV95/LN02, 2 m COG tile.
  notes:
  - Uses scan_surface_fit_v1 coordinate preprocessing by default; bbox_align_v1 and overview_offset_v1 remain fallback/comparison modes.
  - No restitution, friction, roughness, scarring, or contact-model parameters are tuned to these results.
schema_version: benchmark_case_v1
