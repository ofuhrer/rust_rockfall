case_id: validation_output_mode_rebuildable_reduced_fixture
title: Rebuildable-reduced validation output fixture
description: Tiny deterministic case that exercises the native rebuildable_reduced_output builder-facing outputs without external fixtures.
terrain:
  type: plane
  parameters:
    z0_m: 0.0
    slope_x: 0.0
    slope_y: 0.0
block:
  mass: 10.0
  radius: 0.5
release:
  position: [0.0, 0.0, 1.0]
  velocity: [1.0, 0.0, -0.2]
parameters:
  gravity: 9.81
  normal_restitution: 0.3
  tangential_restitution: 0.8
  friction_coefficient: 0.4
  contact_model: translational_v0
  roughness_model: stochastic_contact_v1
simulation:
  dt: 0.005
  t_max: 0.5
  max_steps: 200
  stop_velocity: 0.01
random:
  seed: 123
  ensemble_size: 3
observations:
  release_points_csv: tests/fixtures/rebuildable_reduced_output/validation_output_mode_rebuildable_reduced_release_points.csv
  deposition_points_csv: tests/fixtures/rebuildable_reduced_output/validation_output_mode_rebuildable_reduced_deposition_points.csv
expected:
  metrics:
  - ensemble_mean_runout_m
  tolerances: {}
outputs:
  validation_output_mode: rebuildable_reduced_output
probabilistic_metadata:
  source_zone_metadata_path: data/processed/swisstopo/tschamut_public_pilot/input/tschamut_public_source_zone_metadata_v1.yaml
  scenario_table_path: data/processed/swisstopo/tschamut_public_pilot/input/tschamut_public_scenario_table_v1.csv
  map_product_id: tschamut_public_conditional_gate_v1
  probability_mode: sampling_weighted_conditional
  normalization_scope: conditioned_on_filter
  scenario_id: tschamut_public_block_observed_rows
hazard_probability:
  probability_model: sampling_weighted
  metadata_path: validation/private/tschamut_public_pilot/target_gate_v1_rebuildable_reduced/validation_tschamut_public_target_gate_v1_rebuildable_reduced_trajectory_metadata.csv
  weight_column: sampling_weight
  normalization_convention: conditioned_on_filter
  filters:
    source_zone_ids:
    - tschamut_public_lps_release_bbox
    scenario_ids:
    - tschamut_public_block_observed_rows
