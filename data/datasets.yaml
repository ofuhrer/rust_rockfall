  - id: chant_sura_2020
    name: Induced Rockfall Dataset #2 (Chant Sura Experimental Campaign), Flüelapass, Grisons, Switzerland
    source_url: https://www.envidat.ch/metadata/induced-rockfall-dataset-chant-sura
    api_url: https://www.envidat.ch/api/3/action/package_show?id=induced-rockfall-dataset-chant-sura
    doi: https://doi.org/10.16904/envidat.174
    license: WSL Data Policy
    license_id: wsl-data
    citation: "Caviezel, A. et al. (2020). Induced Rockfall Dataset #2 (Chant Sura Experimental Campaign), Flüelapass, Grisons, Switzerland. EnviDat. https://doi.org/10.16904/envidat.174"
    authors:
      - Andrin Caviezel
      - Sophia Demmel
      - Yves Bühler
      - Adrian Ringenbach
      - Marc Christen
      - Perry Bartelt
    coordinate_system: "Output trajectories use Swiss projected coordinates consistent with LV95-scale eastings/northings; input archive CRS metadata still needs explicit extraction before DEM-based validation."
    data_types:
      - DEM and orthophoto
      - deposition points
      - reconstructed trajectories
      - StoneNode sensor streams
      - videos
      - rock masses and EOTA shape data
      - published scar-dimension and jump-energy tables
    file_formats:
      - 7z
      - zip
      - geospatial files
      - sensor streams
      - xlsx
    download_status: small_processed_trajectory_subset_checked_in
    local_path: data/raw/chant_sura_2020
    processed_path: data/processed/chant_sura_2020
    intended_validation_use:
      - primary trajectory and physics validation dataset
      - shape and mass sensitivity
      - reconstructed trajectory comparison
      - deposition and runout metrics
      - velocity and bounce-height metrics where reconstructed data permit
    preprocessing_notes:
      - Prefer Input and Output archives before large Experimental Runs or Video archives.
      - WSL Data Policy must be reviewed before committing derived files.
      - Current checked-in subset uses Output/txt reconstructed trajectories RF16W200r1, RF16W800r1, and RF18W200r1.
      - Only the first monotonic time segment is used because the public output text files concatenate jump segments with local time resets.
      - Current validation uses a flat clearance-plane proxy; it does not yet use the large Input.7z DEM.
      - EOTA shape files are summarized as metadata for future non-spherical model development; v0.4.0 still uses equivalent spheres.
    resources:
      - id: experimental_runs
        name: Experimental Runs Archive
        url: https://www.envidat.ch/dataset/71e65311-b0dd-48df-acfc-791c99cb0662/resource/d9c77b83-fd15-414c-a257-461e6d2b2545/download/experimentalruns.7z
