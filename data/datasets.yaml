    authors:
      - Federal Office of Topography swisstopo
    coordinate_system: "LV95 / LN02; represented in project metadata as EPSG:2056 horizontal coordinates with LN02 heights."
    data_types:
      - bare-earth digital elevation model
      - 0.5 m and 2 m raster grid
      - pilot terrain foundation
    file_formats:
      - Cloud Optimized GeoTIFF
      - ASCII XYZ
