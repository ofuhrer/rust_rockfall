  - id: chant_sura_2020
    name: Induced Rockfall Dataset #2 (Chant Sura Experimental Campaign), Flüelapass, Grisons, Switzerland
    source_url: https://www.envidat.ch/metadata/induced-rockfall-dataset-chant-sura
    api_url: https://www.envidat.ch/api/3/action/package_show?id=induced-rockfall-dataset-chant-sura
    doi: https://doi.org/10.16904/envidat.174
    license: WSL Data Policy
    license_id: wsl-data
    citation: "Caviezel, A. et al. (2020). Induced Rockfall Dataset #2 (Chant Sura Experimental Campaign), Flüelapass, Grisons, Switzerland. EnviDat. https://doi.org/10.16904/envidat.174"
    authors:
      - Andrin Caviezel
      - Sophia Demmel
      - Yves Bühler
      - Adrian Ringenbach
      - Marc Christen
      - Perry Bartelt
    coordinate_system: "Output trajectories use Swiss projected coordinates consistent with LV95-scale eastings/northings; the RF16 UAS DEM crop used by contact fixtures reports EPSG:2056 / CH1903+ LV95."
    data_types:
      - DEM and orthophoto
      - deposition points
      - reconstructed trajectories
      - StoneNode sensor streams
      - videos
      - rock masses and EOTA shape data
      - published scar-dimension and jump-energy tables
    file_formats:
      - 7z
      - zip
      - geospatial files
      - sensor streams
      - xlsx
    download_status: small_processed_trajectory_contact_and_heldout_subsets_checked_in
    local_path: data/raw/chant_sura_2020
    processed_path: data/processed/chant_sura_2020
    intended_validation_use:
      - primary trajectory and physics validation dataset
      - shape and mass sensitivity
      - reconstructed trajectory comparison
      - deposition and runout metrics
      - velocity and bounce-height metrics where reconstructed data permit
    preprocessing_notes:
      - Prefer Input and Output archives before large Experimental Runs or Video archives.
      - WSL Data Policy must be reviewed before committing derived files.
      - Current checked-in first-flight subset uses Output/txt reconstructed trajectories RF16W200r1, RF16W800r1, and RF18W200r1.
      - Only the first monotonic time segment is used because the public output text files concatenate jump segments with local time resets.
      - Current checked-in contact subset uses the first three RF16W200r1 local-time-reset segments and a small ASCII-grid crop from the public RF16 UAS DEM in Input.7z.
      - Extended checked-in contact subset uses five selected trajectories, 16 local-time-reset segments, and 11 segment-boundary contact/rebound proxies that remain inside the same RF16 DEM crop.
      - Held-out checked-in contact subset uses six disjoint trajectories, 15 segments, and 9 contact/rebound proxies; metadata_contact_split.json records the deterministic split.
      - The large Input.7z archive remains ignored raw data; only the tiny derived DEM crop is committed as a validation fixture.
      - EOTA shape files are summarized as metadata for future non-spherical model development; v0.5.0 still uses equivalent spheres.
    resources:
      - id: experimental_runs
        name: Experimental Runs Archive
        url: https://www.envidat.ch/dataset/71e65311-b0dd-48df-acfc-791c99cb0662/resource/d9c77b83-fd15-414c-a257-461e6d2b2545/download/experimentalruns.7z
