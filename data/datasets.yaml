    download_status: metadata_only
    local_path: data/raw/swisstopo/swissalti3d
    processed_path: data/processed/swisstopo/swissalti3d
    intended_validation_use:
      - authoritative Swiss terrain input for future hazard-map pilot domains
      - DEM ingestion and CRS/provenance tests
      - not an experimental validation dataset by itself
    preprocessing_notes:
      - Do not commit raw swissALTI3D tiles.
      - Use cropped pilot domains only when license-compatible and scientifically justified.
      - Preserve LV95/EPSG:2056 coordinates, LN02 heights, resolution, tile ids, checksums, and preprocessing provenance.
      - Prefer 2 m tiles for first pilots unless 0.5 m terrain detail is scientifically required.
    resources: []

