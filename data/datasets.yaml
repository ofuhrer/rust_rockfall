datasets:
  - id: tschamut2014
    name: Repetitive trajectory testing in Tschamut 2014
    source_url: https://www.envidat.ch/metadata/tschamut2014
    api_url: https://www.envidat.ch/api/3/action/package_show?id=tschamut2014
    doi: https://doi.org/10.16904/envidat.34
    license: ODbL with Database Contents License (DbCL)
    license_id: odc-odbl
    citation: "Volkwein, A., Gerber, W. (2018). Repetitive trajectory testing in Tschamut 2014. EnviDat. https://doi.org/10.16904/envidat.34"
    authors:
      - Axel Volkwein
      - Werner Gerber
    coordinate_system: "Slope point clouds in CH-1903; block point clouds in local x/y/z coordinates."
    data_types:
      - slope and block point clouds
      - test overview
      - local positioning trajectories at about 10 Hz
      - jumps and impacts from in-block sensors
    file_formats:
      - zip
      - ascii tab-separated
      - Excel
    download_status: small_processed_subset_checked_in
    local_path: data/raw/tschamut2014
    processed_path: data/processed/tschamut2014
    intended_validation_use:
      - trajectory reconstruction checks
      - runout and deposition metrics
      - velocity and acceleration qualitative checks
      - jump and impact statistics
    preprocessing_notes:
      - Extract ZIP archives without modifying raw files.
      - Convert tab-separated trajectory and overview tables to common CSV schemas.
      - Derive release and deposition points from public overview or LPS trajectory tables.
      - Current validation subset derives release and deposition points from first and last samples of the public LPS trajectory table.
      - Current terrain.asc is an idw_residual_dem_from_lps proxy built from public LPS terrain elevations plus a fitted trend plane; it is not an official field DEM.
      - Keep CH-1903 coordinates explicit in metadata; do not transform silently.
    resources:
      - id: slope_block_scans
        name: Tschamut2014_Slope+BlockScans
        url: https://www.envidat.ch/dataset/6a7664a6-77a9-49c9-9498-4b63c018fa09/resource/8cf275ca-06d0-47cf-b67f-48780b019ae6/download/geosciences-08-00088-s001.zip
