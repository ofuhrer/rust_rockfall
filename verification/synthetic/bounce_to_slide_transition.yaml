case_id: regime_bounce_to_slide_transition
title: Bounce-to-slide transition
level: 2
description: Infers a transition from impact to contact-dominated sliding from contact states and speed diagnostics.
terrain:
  type: plane
  parameters: { z0_m: 0.0, slope_x: -0.15, slope_y: 0.0 }
block: { mass: 25.0, radius: 0.5 }
release:
  position: [0.0, 0.0, 2.5]
  velocity: [1.0, 0.0, -2.0]
parameters:
  gravity: 9.81
  normal_restitution: 0.05
  tangential_restitution: 0.8
  friction_coefficient: 0.35
simulation: { dt: 0.005, t_max: 5.0, max_steps: 1000, stop_velocity: 0.05 }
random: { seed: null, ensemble_size: 1 }
expected:
  metrics: [impact_count, final_speed_mps, runout_m, energy_monotonicity_violation_j]
  min_impact_count: 1
  min_runout_m: 0.2
  max_runout_m: 15.0
  tolerances:
    energy_monotonicity_violation_j: 5.0
outputs:
  diagnostics_json: verification/results/regime_bounce_to_slide_transition.json
  trajectory_csv: verification/results/regime_bounce_to_slide_transition.csv
references:
  notes:
    - "v0 has no explicit regime labels beyond contact_state; this case infers the transition from impact count and final contact dynamics."

