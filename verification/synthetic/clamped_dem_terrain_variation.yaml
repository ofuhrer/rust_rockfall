schema_version: benchmark_case_v1
case_id: synthetic_clamped_dem_terrain_variation
title: Clamped DEM terrain variation smoke test
level: 1
description: Verifies that the opt-in clamped ESRI ASCII terrain can run a deterministic trajectory over a small varied DEM patch without changing strict DEM behavior.
terrain:
  type: ascii_dem_clamped
  path: verification/synthetic/fixtures/tiny_varied_dem.asc
block: { mass: 10.0, radius: 0.5 }
release:
  position: [-0.5, 2.0, 1.0]
  velocity: [1.2, 0.0, 0.0]
parameters:
  gravity: 9.81
  normal_restitution: 0.2
  tangential_restitution: 0.8
  friction_coefficient: 0.4
simulation: { dt: 0.005, t_max: 0.8, max_steps: 160, stop_velocity: 0.05 }
random: { seed: null, ensemble_size: 1 }
expected:
  metrics: [runout_m, max_speed_mps, max_bounce_height_m, impact_count]
  min_runout_m: 0.05
  max_runout_m: 3.0
  minimums:
    impact_count: 1
  maximums:
    max_speed_mps: 4.0
    max_bounce_height_m: 1.2
outputs:
  diagnostics_json: verification/results/synthetic_clamped_dem_terrain_variation.json
  trajectory_csv: verification/results/synthetic_clamped_dem_terrain_variation.csv
references:
  notes:
    - "The release starts outside the x-min grid edge, so this case exercises the explicit clamped-boundary DEM policy."
    - "Interpolation and normal accuracy are covered by Rust unit tests; this YAML case verifies integration through the CLI runner."
report:
  verifies:
    - "The opt-in clamped DEM terrain path can run a finite deterministic trajectory over a varied terrain patch."
    - "Boundary clamping is explicit: the initial x coordinate lies outside the raster extent."
  does_not_verify:
    - "Production GIS terrain handling, field-scale DEM quality, or operational terrain calibration."
