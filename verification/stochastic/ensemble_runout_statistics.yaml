case_id: stochastic_ensemble_runout_statistics
title: Ensemble runout statistics
level: 3
description: "Verifies deterministic ensemble summary outputs: mean, median, p05, p95, and max kinetic-energy envelope."
terrain:
  type: plane
  parameters: { z0_m: 0.0, slope_x: -0.15, slope_y: 0.0 }
block: { mass: 20.0, radius: 0.5 }
release:
  position: [0.0, 0.0, 2.5]
  velocity: [1.0, 0.0, -0.5]
  perturbation: { position_uniform_m: 0.1, velocity_uniform_mps: 0.05 }
parameters:
  gravity: 9.81
  normal_restitution: 0.25
  tangential_restitution: 0.85
  friction_coefficient: 0.5
simulation: { dt: 0.01, t_max: 5.0, max_steps: 500, stop_velocity: 0.05 }
random: { seed: 777, ensemble_size: 12 }
expected:
  metrics:
    - ensemble_mean_runout_m
    - ensemble_median_runout_m
    - ensemble_p05_runout_m
    - ensemble_p95_runout_m
    - ensemble_p95_max_kinetic_energy_j
  minimums:
    ensemble_mean_runout_m: 0.1
    ensemble_p95_runout_m: 0.1
  maximums:
    ensemble_mean_runout_m: 30.0
    ensemble_p95_max_kinetic_energy_j: 5000.0
outputs:
  diagnostics_json: verification/results/stochastic_ensemble_runout_statistics.json
references:
  notes:
    - "Serial seeded execution keeps this stable enough for CI without requiring bitwise guarantees from parallel reductions."
