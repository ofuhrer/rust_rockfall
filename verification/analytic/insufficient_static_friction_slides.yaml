case_id: analytic_insufficient_static_friction_slides
title: Insufficient static friction causes sliding
level: 0
description: Verifies that the rotational contact model reports sliding when friction cannot support no-slip rolling on a steep plane.
terrain:
  type: plane
  parameters: { z0_m: 0.0, slope_x: -0.5, slope_y: 0.0 }
block: { mass: 10.0, radius: 0.5 }
release:
  position: [0.0, 0.0, 0.5590169943749475]
  velocity: [0.0, 0.0, 0.0]
  angular_velocity: [0.0, 0.0, 0.0]
parameters:
  gravity: 9.81
  normal_restitution: 0.0
  tangential_restitution: 1.0
  friction_coefficient: 0.01
  rolling_resistance_coefficient: 0.0
  contact_model: sphere_rotational_v1
simulation: { dt: 0.01, t_max: 0.1, max_steps: 10, stop_velocity: 0.0 }
random: { seed: null, ensemble_size: 1 }
expected:
  metrics: [final_rolling_residual_mps, final_speed_mps]
  contact_state: sliding
  minimums:
    final_rolling_residual_mps: 0.001
    final_speed_mps: 0.001
outputs:
  diagnostics_json: verification/results/analytic_insufficient_static_friction_slides.json
  trajectory_csv: verification/results/analytic_insufficient_static_friction_slides.csv
references:
  notes:
    - "Static friction required for solid-sphere rolling is (2/7)g sin(theta), which exceeds the configured Coulomb limit here."

