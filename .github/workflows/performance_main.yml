name: Performance (main trend)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "performance-pages"
  cancel-in-progress: true

jobs:
  benchmark-and-build-site:
    name: Benchmark main and publish trend page
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-tools.txt

      - name: Install Python tool requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-tools.txt

      - name: Run standard synthetic benchmark
        run: |
          python scripts/run_performance_benchmark.py \
            --profile standard \
            --output-root validation/results/performance_ci_main

      - name: Build performance history and chart
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          PERFORMANCE_BASE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}"
          COMMIT_DATE="${{ github.event.head_commit.timestamp }}"
          if [ -z "$COMMIT_DATE" ]; then
            COMMIT_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          python scripts/performance_ci_tracking.py record-main \
            --summary-csv validation/results/performance_ci_main/summary.csv \
            --history-url "${PERFORMANCE_BASE_URL}/performance/history.json" \
            --commit-sha "${GITHUB_SHA}" \
            --commit-date "$COMMIT_DATE" \
            --history-out performance_site/performance/history.json \
            --latest-out performance_site/performance/latest.json \
            --chart-out performance_site/performance/main_performance.svg \
            --index-out performance_site/performance/index.html
          cp validation/results/performance_ci_main/summary.csv performance_site/performance/latest_summary.csv

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: performance_site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
