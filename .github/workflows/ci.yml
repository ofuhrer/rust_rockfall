name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── fast lint gate ─────────────────────────────────────────────────────────
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── Rust unit + integration tests ──────────────────────────────────────────
  test:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test

  # ── analytic verification + real-data validation cases ────────────────────
  verify:
    name: Verify + Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo run -- verify --all
        run: cargo run --release -- verify --all

      - name: cargo run -- validate --all
        run: cargo run --release -- validate --all

  # ── Python workflow tests + repository consistency ─────────────────────────
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-tools.txt

      - name: Install Python tool requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-tools.txt

      - name: Python unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Repository consistency
        run: python scripts/check_repo_consistency.py
