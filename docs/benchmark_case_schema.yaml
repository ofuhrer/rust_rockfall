schema_version: benchmark_case_v1
case_id: string
title: string
level: 0
description: string
terrain:
  type: plane # or ascii_dem_clamped / esri_ascii_grid_clamped for bounded DEM patches
  parameters:
    z0_m: 0.0
    slope_x: 0.0
    slope_y: 0.0
  path: null
  metadata_path: null # optional Swiss/swisstopo-style terrain-source metadata sidecar
terrain_classes:
  metadata_path: null # optional aligned LV95/LN02 categorical raster metadata sidecar
block:
  mass: 10.0
  radius: 0.5
block_shape:
  metadata_path: null # optional passive shape_metadata_v1 sidecar; current contact remains spherical
release:
  position: [0.0, 0.0, 1.0]
  velocity: [0.0, 0.0, 0.0]
  angular_velocity: [0.0, 0.0, 0.0]
  perturbation:
    position_uniform_m: 0.0
    velocity_uniform_mps: 0.0
release_zone:
  metadata_path: null # optional LV95/LN02 polygon source-area metadata sidecar
  generated_release_points_csv: null # optional generated release-point audit output
parameters:
  gravity: 9.81
  normal_restitution: 0.25
  tangential_restitution: 0.85
  friction_coefficient: 0.45
  rolling_resistance_coefficient: 0.0
  contact_model: translational_v0
  soil_interaction_model: none # or scarring_contact_v1
  soil_strength_pa: 0.0
  scarring_drag_coefficient: 0.0
  scarring_layer_density_kgpm3: 0.0
  scarring_max_depth_m: null
  roughness_model: none
  roughness_std_normal: 0.0
  roughness_std_tangent: 0.0
  roughness_std_angle: 0.0
simulation:
  dt: 0.01
  t_max: 1.0
  max_steps: 100
  stop_velocity: 0.10
random:
  seed: 1
  ensemble_size: 1
hazard_layers:
  statistics:
    kinetic_energy_exceedance_j: []
    jump_height_exceedance_m: []
    velocity_exceedance_mps: []
hazard_probability:
  probability_model: null # currently only sampling_weighted is supported
  metadata_path: null # trajectory_metadata_table_v1 CSV
  weight_column: null # currently only sampling_weight is supported
  normalization_convention: null # currently only conditioned_on_filter is supported
  filters:
    source_zone_ids: []
    scenario_ids: []
    block_mass_kg_min: null
    block_mass_kg_max: null
hazard_map_package:
  map_product_id: null # optional labelled Phase 1 hazard-map package metadata
  probability_mode: null
  normalization_scope: null
  source_zone_metadata_path: null
  scenario_table_path: null
  map_package_manifest_json: null
  limitations: []
validation_scope:
  type: null
  note: null
observations:
  release_points_csv: null
  deposition_points_csv: null
  trajectory_csv: null
  contact_events_csv: null
expected:
  metrics: [runout_m, impact_count]
  final_position_m: null
  final_velocity_mps: null
  rebound_height_m: null
  stopping_distance_m: null
  impact_time_s: null
  min_runout_m: null
  max_runout_m: null
  min_impact_count: null
  max_impact_count: null
  values: {}
  minimums: {}
  maximums: {}
  tolerances: {}
outputs:
  trajectory_csv: verification/results/example.csv
  trajectory_metadata_csv: null
  diagnostics_json: verification/results/example.json
  manifest_json: verification/results/example_manifest.json
  validation_output_mode: null
  ensemble_deposition_csv: null
  ensemble_trajectories_dir: null
  ensemble_impact_events_dir: null
  ensemble_impact_events_parquet: null
  impact_events_csv: null
  impact_events_json: null
references:
  literature: []
  dataset: null
  notes: []

# Local/private real-site pilot templates live under validation/templates/.
# They should be materialized into ignored validation/private/ cases with
# scripts/prepare_tschamut_swissalti3d_pilot.py before running validate.
#
# run_manifest_v1 sidecars include optional performance timing/output-volume
# metadata. See docs/performance_benchmarking.md.
